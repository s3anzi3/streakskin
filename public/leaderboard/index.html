<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/ebk-loader.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="EBK leaderboards — top scores for every game and sport." />
  <title>Leaderboards · EBK</title>
  <link rel="icon" type="image/svg+xml" href="/img/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/home.css" />
  <link rel="stylesheet" href="/css/team.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="wordmark" aria-label="EBK">E<span>B</span>K</span>
      <span class="brand-sub">Elite Ball Knowledge</span>
    </a>
  </header>
  <main>
    <section class="hero wrap" style="padding-bottom: var(--sp-md)">
      <h1 class="rise">🏆 Leaderboards</h1>
      <p class="rise d1">Top runs for every game, every sport.</p>
    </section>
    <div class="wrap" style="max-width:760px">
      <div class="filters" style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-md)">
        <span class="field">Ranking <select id="cat" class="search">
          <option value="game">Best run · sport + game</option>
          <option value="sport">Sport total · all games</option>
          <option value="game-all">Game total · all sports</option>
          <option value="overall">Overall total · everything</option>
          <option value="plays">Most games played</option>
        </select></span>
        <span class="field" id="sport-field">Sport <select id="sport" class="search"></select></span>
        <span class="field" id="game-field">Game <select id="game" class="search"></select></span>
      </div>
      <p class="count" id="status"></p>
      <div class="table-wrap">
        <table class="tbl"><thead><tr><th>#</th><th>Player</th><th id="metric">Best</th><th>Plays</th></tr></thead>
        <tbody id="board"></tbody></table>
      </div>
    </div>
  </main>
  <script src="/js/catalog.js"></script>
  <script src="/js/ebk-ui.js"></script>
  <script src="/js/leaderboard.js"></script>
  <script src="/js/ebk-sound.js"></script>
</body>
</html>
