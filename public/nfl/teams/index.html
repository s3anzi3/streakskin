<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/ebk-loader.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="Pick an NFL team to study — every player-season, filterable and sortable. EBK." />
  <title>NFL Teams · EBK</title>
  <link rel="preconnect" href="https://static.www.nfl.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="/img/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/home.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="wordmark" aria-label="EBK">E<span>B</span>K</span>
      <span class="brand-sub">Elite Ball Knowledge</span>
    </a>
    <a class="header-tag" href="/nfl">← NFL</a>
  </header>

  <main>
    <section class="hero wrap" style="padding-bottom: var(--sp-md)">
      <h1 class="rise">🏈 Team Study</h1>
      <p class="rise d1">Pick a team to browse, filter and sort every player-season in the EBK pool.</p>
    </section>
    <div class="wrap">
      <div class="team-grid" id="team-grid"></div>
    </div>
  </main>

  <script src="/js/teams.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("team-grid");
      if (!grid || !window.NFL) return;
      NFL.franchises.slice().sort(function (a, b) { return a.name.localeCompare(b.name); })
        .forEach(function (f) {
          var a = document.createElement("a");
          a.className = "team-tile";
          a.href = "/nfl/team?t=" + f.key;
          a.innerHTML = '<img src="' + NFL.logo(f.key) + '" alt="" loading="lazy" />' +
                        '<span>' + f.name + "</span>";
          grid.appendChild(a);
        });
    })();
  </script>
  <script src="/js/ebk-sound.js"></script>
</body>
</html>
