<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/ebk-loader.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="Guess the Stat Line (NHL) — name the player from a mystery season's numbers." />
  <title>NHL · Guess the Stat Line · EBK</title>
  <link rel="preconnect" href="https://a.espncdn.com" crossorigin />
  <link rel="preconnect" href="https://assets.nhle.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="/img/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/game-common.css" />
</head>
<body data-sport="nhl">
  <div class="gpage">
    <header class="gtop">
      <a class="ghome" href="/nhl">&larr; <b>NHL</b></a>
      <p class="gtitle">Guess the Stat&nbsp;Line <small>· NHL</small></p>
      <div class="gscore">
        <div class="chip"><span class="k">Score</span><span class="v" id="score">0</span></div>
        <div class="chip"><span class="k">Best</span><span class="v" id="best">0</span></div>
      </div>
    </header>
    <main class="gwrap">
      <p id="loading" class="muted center" role="status" aria-live="polite">Loading…</p>
      <div id="game" hidden>
        <div class="gcard">
          <div class="center">
            <span class="muted" id="pos-line">Player</span>
            <div class="center muted" id="team-line" style="margin-top:4px;font-weight:700">Team:</div>
            <div style="margin-top:8px"><span class="season-badge" id="season-badge">????</span></div>
          </div>
          <div class="statline" id="statline"></div>
          <div class="row-btns" id="lifelines" style="margin-top:var(--sp-md)">
            <button class="gbtn ghost" id="reveal-exact" style="min-height:44px">🎯 Reveal exact season (5)</button>
          </div>
        </div>
        <div class="opt-list" id="options"></div>
        <div class="banner" id="banner"></div>
        <div class="player-reveal" id="reveal" hidden></div>
        <div class="row-btns" id="next-row" hidden></div>
      </div>
    </main>
  </div>
  <script src="/js/nhl-teams.js"></script>
  <script src="/js/stat-line.js"></script>
  <script src="/js/ebk-sound.js"></script>
</body>
</html>
