<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="NHL team study — browse, filter and sort every player-season for a team." />
  <title>NHL Team Study · EBK</title>
  <link rel="preconnect" href="https://a.espncdn.com" crossorigin />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/game-common.css" />
  <link rel="stylesheet" href="/css/team.css" />
</head>
<body data-sport="nhl">
  <div class="gpage">
    <header class="gtop">
      <a class="ghome" href="/nhl">&larr; <b>NHL</b></a>
      <p class="gtitle">Team Study <small>· NHL</small></p>
    </header>
    <main class="gwrap" style="max-width: 1000px;">
      <p id="loading" class="muted center" role="status" aria-live="polite">Loading…</p>
      <div id="content" hidden>
        <div class="team-head" id="team-head"></div>
        <div class="filters"><div class="chip-row2" id="pos-chips"></div></div>
        <div class="filters">
          <span class="field">Seasons <select id="from"></select> – <select id="to"></select></span>
          <input class="search" id="search" type="search" placeholder="Search player…"
                 autocomplete="off" autocapitalize="off" spellcheck="false" />
        </div>
        <p class="count" id="count"></p>
        <div class="table-wrap"><table class="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
      </div>
    </main>
  </div>
  <script src="/js/nhl-teams.js"></script>
  <script src="/js/team.js"></script>
</body>
</html>
