<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/ebk-loader.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="Career Path (Premier League) — trace club and career clues to the player." />
  <title>Soccer · Career Path · EBK</title>
  <link rel="preconnect" href="https://resources.premierleague.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="/img/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/game-common.css" />
</head>
<body data-sport="soccer">
  <div class="gpage">
    <header class="gtop">
      <a class="ghome" href="/soccer">&larr; <b>Soccer</b></a>
      <p class="gtitle">Career Path <small>· PL</small></p>
      <div class="gscore">
        <div class="chip"><span class="k">Score</span><span class="v" id="score">0</span></div>
        <div class="chip"><span class="k">Best</span><span class="v" id="best">0</span></div>
      </div>
    </header>
    <main class="gwrap">
      <p id="loading" class="muted center" role="status" aria-live="polite">Loading…</p>
      <div id="game" hidden>
        <div class="gcard">
          <p class="center muted" style="margin:0 0 var(--sp-sm)">Who is this player?</p>
          <div class="clues" id="facts"></div>
          <div class="row-btns" id="lifelines" style="margin-top:var(--sp-md)">
            <button class="gbtn ghost" id="reveal-fact" style="min-height:44px">🔎 Reveal hidden fact (5)</button>
          </div>
        </div>
        <div class="opt-list" id="options"></div>
        <div class="banner" id="banner"></div>
        <div class="player-reveal" id="reveal" hidden></div>
        <div class="row-btns" id="next-row" hidden></div>
      </div>
    </main>
  </div>
  <script src="/js/soccer-teams.js"></script>
  <script src="/js/career-path.js"></script>
  <script src="/js/ebk-sound.js"></script>
</body>
</html>
